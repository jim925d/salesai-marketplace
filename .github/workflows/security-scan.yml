name: Security Scan

on:
  schedule:
    # Weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: NPM audit
        run: npm audit --audit-level=moderate

      - name: Check for known vulnerabilities
        run: npx audit-ci --moderate
        continue-on-error: true

      - name: Type-check (catch type-safety regressions)
        run: npx tsc --noEmit && npx tsc -p tsconfig.api.json --noEmit

      - name: Verify no secrets in codebase
        run: |
          # Check for common secret patterns in tracked files
          if git grep -iE '(sk-[a-zA-Z0-9]{20,}|sk_live_|sk_test_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36})' -- ':(exclude)*.lock' ':(exclude)*.yml'; then
            echo "::error::Potential secrets detected in codebase!"
            exit 1
          fi
          echo "No secrets found."
