body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;opacity:0.025;pointer-events:none;z-index:50;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}

@keyframes fadeUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Upload area */
.drop-zone{border:2px dashed var(--bdr);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-dim)}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{text-align:left;padding:8px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--bdr);font-weight:600;position:sticky;top:0;background:var(--bg2)}
.data-table td{padding:7px 10px;border-bottom:1px solid var(--bdr);color:var(--text2);font-size:12px}
.data-table tr:hover td{background:rgba(230,237,243,0.02)}

/* Tabs */
.tab-bar{display:flex;gap:2px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;background:transparent;color:var(--text3)}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}

const cn = (...args) => args.filter(Boolean).join(' ')
let modelSource = 'demo'

// ── localStorage helpers ──────────────────────────────────────
const STORAGE_KEY = 'selleractions_accounts'
const loadAccounts = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch { return [] } }
const saveAccounts = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data))

// ── CSV Parser ────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n')
  if (lines.length < 2) return []
  const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[\s\/]+/g, '_').replace(/[^a-z0-9_]/g, ''))
  return lines.slice(1).map(line => {
    const vals = []
    let current = '', inQuotes = false
    for (let i = 0; i < line.length; i++) {
      const ch = line[i]
      if (ch === '"') { inQuotes = !inQuotes }
      else if (ch === ',' && !inQuotes) { vals.push(current.trim()); current = '' }
      else { current += ch }
    }
    vals.push(current.trim())
    const obj = {}
    headers.forEach((h, i) => {
      const v = vals[i] || ''
      const num = parseFloat(v.replace(/[$,%]/g, ''))
      obj[h] = !isNaN(num) && v.match(/^[\$\-]?[\d,]+\.?\d*%?$/) ? num : v
    })
    return obj
  })
}

// ── Field mapper ──────────────────────────────────────────────
const FIELD_MAP = {
  name: ['name','account','account_name','company','company_name','customer','customer_name'],
  vertical: ['vertical','industry','segment','sector'],
  products: ['products','product','services','service','product_name'],
  mrr: ['mrr','monthly_revenue','monthly_recurring_revenue','revenue'],
  arr: ['arr','annual_revenue','annual_recurring_revenue'],
  pipeline_mrr: ['pipeline_mrr','pipeline_value','pipeline','opportunity_value'],
  pipeline_count: ['pipeline_count','pipeline_deals','open_deals','opportunities'],
  win_rate: ['win_rate','winrate','close_rate'],
  days_silent: ['days_silent','days_since_contact','last_contact_days','silence_days'],
  risk_score: ['risk_score','risk','health_score'],
  risk_level: ['risk_level','health_level','health','status','account_status'],
  velocity: ['velocity','momentum','trend'],
  churn_mrr: ['churn_mrr','churned_mrr','lost_mrr'],
  disconnects: ['disconnects','disconnect_count','cancellations'],
  nrr: ['nrr','net_revenue_retention','retention_rate'],
}

function mapFields(rawRows) {
  return rawRows.map(row => {
    const mapped = { id: crypto.randomUUID() }
    for (const [field, aliases] of Object.entries(FIELD_MAP)) {
      const key = Object.keys(row).find(k => aliases.includes(k.toLowerCase()))
      if (key !== undefined) {
        let val = row[key]
        if (field === 'products' && typeof val === 'string') val = val.split(/[;|,]/).map(s => s.trim()).filter(Boolean)
        if (field === 'win_rate' && typeof val === 'number' && val > 1) val = val / 100
        if (field === 'nrr' && typeof val === 'number' && val > 2) val = val / 100
        mapped[field] = val
      }
    }
    if (!mapped.name) mapped.name = row[Object.keys(row)[0]] || 'Unknown'
    return mapped
  })
}

// ── Math helpers ──────────────────────────────────────────────
const sigmoid = x => 1 / (1 + Math.exp(-Math.max(-500, Math.min(500, x))))
const dot = (a, b) => a.reduce((s, v, i) => s + v * b[i], 0)
const predict = (x, model) => sigmoid(dot(model.weights, x) + model.bias)

function extractFeatures(deal, stats) {
  const ov = stats.overall
  const vwr = stats.vwr[deal.vertical] ?? ov
  const pwr = stats.pwr[deal.product] ?? ov
  const szp = stats.valsSorted.length ? stats.valsSorted.findIndex(v => v >= deal.dealValue) / stats.valsSorted.length : 0.5
  const dn = deal.daysOpen != null ? Math.max(0, Math.min(1, 1 - (deal.daysOpen - stats.daysMean) / (stats.daysStd * 3 + 1))) : 0.5
  const cwr = stats.comboR[`${deal.vertical}|${deal.product}`] ?? ov
  return [vwr, pwr, szp < 0 ? 1 : szp, dn, cwr]
}

// ── Demo model ────────────────────────────────────────────────
const DEMO_MODEL = {
  generatedAt: '2026-03-18T00:00:00Z', source: 'demo',
  stats: {
    overall: 0.52,
    vwr: { 'Enterprise Telco': 0.68, 'Regional ISP': 0.54, 'Cable MSO': 0.61, 'Neutral Host': 0.44, 'Healthcare': 0.59, 'Public Sector': 0.62 },
    pwr: { 'Metro Ethernet': 0.71, DIA: 0.58, 'SD-WAN': 0.63, MPLS: 0.49, 'Dark Fiber': 0.65, 'Wavelength': 0.60 },
    comboR: { 'Enterprise Telco|Metro Ethernet': 0.79, 'Regional ISP|DIA': 0.55, 'Cable MSO|SD-WAN': 0.66, 'Neutral Host|MPLS': 0.38 },
    valsSorted: [2000, 4000, 6000, 8000, 10000, 12000, 15000, 20000], daysMean: 28, daysStd: 14,
  },
  vertModels: {
    'Enterprise Telco': { weights: [1.2, 0.9, -0.3, 0.4, 1.1], bias: -0.5 },
    'Regional ISP': { weights: [0.8, 1.1, -0.2, 0.3, 0.7], bias: -0.3 },
  },
  globalModel: { weights: [0.9, 0.8, -0.25, 0.35, 0.85], bias: -0.35 },
  churnModel: { weights: [1.1, 0.9, -0.3, 0.4, 0.8], bias: -0.4 },
}

// ── Scoring ───────────────────────────────────────────────────
const scoreWinProb = (deal, md) => Math.round(predict(extractFeatures(deal, md.stats), md.vertModels[deal.vertical] || md.globalModel) * 100)
const scoreChurnRisk = (deal, md) => {
  const s = md.stats
  const mtmNorm = Math.min(1, (deal.mtmDays || 0) / 90)
  const touchNorm = deal.daysSinceContact != null ? Math.min(1, deal.daysSinceContact / 60) : 0.5
  const szp = s.valsSorted.length ? s.valsSorted.findIndex(v => v >= (deal.dealValue || 0)) / s.valsSorted.length : 0.5
  const vcr = 1 - (s.vwr[deal.vertical] ?? s.overall)
  return Math.round(predict([mtmNorm, touchNorm, szp < 0 ? 1 : szp, vcr, 0.5], md.churnModel) * 100)
}

const buildWinBreakdown = (deal, md) => {
  const s = md.stats
  const vwr = s.vwr[deal.vertical] ?? s.overall, pwr = s.pwr[deal.product] ?? s.overall
  const cwr = s.comboR[`${deal.vertical}|${deal.product}`] ?? s.overall
  const szp = s.valsSorted.length ? s.valsSorted.findIndex(v => v >= deal.dealValue) / s.valsSorted.length : 0.5
  return [
    { icon: '📊', label: 'Vertical win rate', value: `${Math.round(vwr * 100)}%`, sub: deal.vertical, score: Math.round(vwr * 100) },
    { icon: '✅', label: 'Product win rate', value: `${Math.round(pwr * 100)}%`, sub: deal.product, score: Math.round(pwr * 100) },
    { icon: '⚔️', label: 'Vertical × Product', value: `${Math.round(cwr * 100)}%`, sub: `${deal.vertical} + ${deal.product}`, score: Math.round(cwr * 100) },
    { icon: '💰', label: 'Deal size percentile', value: `${Math.round((szp < 0 ? 1 : szp) * 100)}th`, sub: `$${(deal.dealValue || 0).toLocaleString()} MRR`, score: Math.round((szp < 0 ? 1 : szp) * 100) },
    { icon: '⏱', label: 'Days open', value: deal.daysOpen != null ? `${deal.daysOpen}d` : '—', sub: `Avg close: ${s.daysMean}d`, score: deal.daysOpen != null ? Math.round(Math.max(0, Math.min(1, 1 - (deal.daysOpen - s.daysMean) / (s.daysStd * 3 + 1))) * 100) : 50 },
  ]
}

const buildChurnBreakdown = (deal, md) => {
  const s = md.stats
  const vwr = s.vwr[deal.vertical] ?? s.overall
  return [
    { icon: '⏰', label: 'Days in MtM', value: `${deal.mtmDays || 0}d`, sub: 'churn risk rises after 60d', score: Math.min(100, Math.round(((deal.mtmDays || 0) / 90) * 100)) },
    { icon: '📉', label: 'Days since contact', value: deal.daysSinceContact != null ? `${deal.daysSinceContact}d` : '—', sub: 'no renewal discussion logged', score: Math.min(100, Math.round(((deal.daysSinceContact || 0) / 60) * 100)) },
    { icon: '🏢', label: 'Vertical churn rate', value: `${Math.round((1 - vwr) * 100)}%`, sub: deal.vertical, score: Math.round((1 - vwr) * 100) },
    { icon: '💰', label: 'MRR at risk', value: `$${(deal.dealValue || 0).toLocaleString()}`, sub: 'total exposed revenue', score: 80 },
    { icon: '🛡️', label: 'Save window', value: deal.mtmDays < 60 ? 'Open' : 'Closing', sub: 'save rate drops after day 60', score: deal.mtmDays < 60 ? 30 : 85 },
  ]
}

// ── Demo cards ────────────────────────────────────────────────
const DEMO_CARDS = [
  { card: { type:'prospect_1', label:'PROSPECTING', labelColor:T.blue, mode:'Prospecting', account:'Pacific Fiber Networks', tagline:'3 new locations detected · Competitor shift at HQ', signals:[{icon:'📍',text:'Added 3 locations in Sacramento metro (last 30 days)'},{icon:'⚡',text:'HQ site moved on-net — AT&T lost coverage on Nov build-out'},{icon:'📉',text:'Lost 2 competitor bids in 2023 — both on price, not product'},{icon:'💰',text:'Historically buys in $8K–$14K MRR range per location'}], suggestedMove:'Reach out re: new Sacramento sites. Lead with the HQ on-net news — they\'ve been price-sensitive, not product-sensitive. Anchor to $10K MRR per site.', cta:'Draft Outreach', hasWinProb:false, hasChurnRisk:false }, dealProfile:{vertical:'Regional ISP',product:'Metro Ethernet',dealValue:10000,daysOpen:null,mtmDays:null,daysSinceContact:null} },
  { card: { type:'prospect_2', label:'PROSPECTING', labelColor:T.blue, mode:'Prospecting', account:'Redwood Municipal Broadband', tagline:'New logo · RFP open for dark fiber backbone', signals:[{icon:'🎯',text:'Open RFP for 10G dark fiber ring connecting 5 city buildings — deadline Apr 15'},{icon:'🏢',text:'All 5 locations within 0.5mi of your existing fiber routes'},{icon:'📊',text:'Municipal broadband vertical win rate: 72% when on-net advantage exists'},{icon:'💰',text:'Estimated MRR: $18K–$24K for full ring + maintenance'}], suggestedMove:'Submit RFP response by Apr 10. Lead with on-net proximity and SLA guarantees — municipals prioritize reliability over price.', cta:'Draft Outreach', hasWinProb:false, hasChurnRisk:false }, dealProfile:{vertical:'Public Sector',product:'Dark Fiber',dealValue:20000,daysOpen:null,mtmDays:null,daysSinceContact:null} },
  { card: { type:'prospect_3', label:'PROSPECTING', labelColor:T.blue, mode:'Prospecting', account:'Summit Health Partners', tagline:'Healthcare expansion · 3 new clinic sites announced', signals:[{icon:'🏥',text:'3 new urgent care clinics opening in Denver metro — Q2 2026 target'},{icon:'🔒',text:'Healthcare requires HIPAA-compliant connectivity — your SD-WAN meets this'},{icon:'🔄',text:'Similar win: MedFirst Group, 4 clinics, $9,200 MRR, 22-day close'},{icon:'📍',text:'2 of 3 sites are on-net today — third is 0.4mi from POP'}], suggestedMove:'Initiate contact with their IT Director. Lead with HIPAA-compliant SD-WAN bundle and reference the MedFirst deployment.', cta:'Draft Outreach', hasWinProb:false, hasChurnRisk:false }, dealProfile:{vertical:'Healthcare',product:'SD-WAN',dealValue:9200,daysOpen:null,mtmDays:null,daysSinceContact:null} },
  { card: { type:'growth_1', label:'GROWTH', labelColor:T.green, mode:'Growth', account:'Cascade Broadband Co.', tagline:'2 locations underserved · Competitor displacement opportunity', signals:[{icon:'🏢',text:'Phoenix (AZ-04): Currently on Lumen DIA 500Mb — your 1Gb fiber is on-net same building'},{icon:'🏢',text:'Tucson (AZ-07): Off-net today, new on-net POP live Q1 2026 — 0.3mi from their office'},{icon:'🔄',text:'Similar displacement win in Mesa, AZ — $6,200 MRR, 14-day close'},{icon:'💡',text:'Recommend: Metro Ethernet 1Gb at Phoenix, SD-WAN bundle at Tucson on activation'}], suggestedMove:'Lead with Phoenix — it\'s a direct upgrade at the same building, easy yes. Use that to open Tucson conversation before your POP goes live.', cta:'Build Quote', ctaSecondary:'Build Outreach', hasWinProb:true, hasChurnRisk:false }, dealProfile:{vertical:'Enterprise Telco',product:'Metro Ethernet',dealValue:12400,daysOpen:18,mtmDays:null,daysSinceContact:null} },
  { card: { type:'growth_2', label:'GROWTH', labelColor:T.green, mode:'Growth', account:'Pinnacle Data Centers', tagline:'$8.4K MRR customer · Cross-connect expansion in progress', signals:[{icon:'📊',text:'Currently on DIA 1Gb at 2 sites ($8,400 MRR) — 98.7% utilization on primary'},{icon:'⚡',text:'Customer submitted a 10G wavelength inquiry through portal last week'},{icon:'🏢',text:'New data hall opening in Ashburn, VA — needs connectivity by May 2026'},{icon:'💰',text:'Wavelength + cross-connect bundle estimated at $14K–$18K MRR'}], suggestedMove:'Respond to the 10G inquiry with a bundled proposal — wavelength + Ashburn cross-connect. Offer a 3-year term discount to lock in before they RFP.', cta:'Build Quote', ctaSecondary:'Build Outreach', hasWinProb:true, hasChurnRisk:false }, dealProfile:{vertical:'Enterprise Telco',product:'Wavelength',dealValue:16000,daysOpen:8,mtmDays:null,daysSinceContact:null} },
  { card: { type:'growth_3', label:'GROWTH', labelColor:T.green, mode:'Growth', account:'Atlas Tower Co', tagline:'SD-WAN deal in Propose stage · $6.8K MRR', signals:[{icon:'📈',text:'SD-WAN 12-site deal at $6,800 MRR — moved to Propose stage 5 days ago'},{icon:'✅',text:'Historical win rate for SD-WAN in this vertical: 63%'},{icon:'🔄',text:'Customer already on your DIA at 4 locations — strong existing relationship'},{icon:'💡',text:'Decision maker (VP Ops) responded positively to last proposal meeting'}], suggestedMove:'Schedule a technical review with their network team. The deal is in proposal — address any remaining objections and push for verbal this week.', cta:'Build Quote', ctaSecondary:'Build Outreach', hasWinProb:true, hasChurnRisk:false }, dealProfile:{vertical:'Neutral Host',product:'SD-WAN',dealValue:6800,daysOpen:25,mtmDays:null,daysSinceContact:null} },
  { card: { type:'retention_1', label:'RETENTION', labelColor:T.yellow, mode:'Retention', account:'TriState Infrastructure LLC', tagline:'2 services MtM · Contract window closing in 34 days', signals:[{icon:'⏰',text:'DIA 200Mb at Dallas-01 went MtM 47 days ago — no renewal discussion logged'},{icon:'⏰',text:'MPLS 3-site bundle expires Dec 31 — $11,400 MRR at risk'},{icon:'📊',text:'Accounts in this pattern churn within 90 days 68% of the time without contact'},{icon:'🛡️',text:'Save rate jumps to 81% when renewal offer made before day 60 of MtM'}], suggestedMove:'Contact by Friday. Offer 2-year renewal with 5% rate lock — historicals show they respond to pricing stability over upgrades. Don\'t lead with new products.', cta:'Build Renewal Offer', hasWinProb:true, hasChurnRisk:true }, dealProfile:{vertical:'Enterprise Telco',product:'MPLS',dealValue:11400,daysOpen:null,mtmDays:47,daysSinceContact:47} },
  { card: { type:'retention_2', label:'RETENTION', labelColor:T.yellow, mode:'Retention', account:'Meridian Telecom Group', tagline:'$22K MRR at risk · 2 trouble tickets unresolved', signals:[{icon:'🚨',text:'2 open trouble tickets — latency issues at Chicago-02 and Denver-01 for 12 days'},{icon:'📉',text:'NRR dropped to 87% this quarter — they downgraded 1 circuit last month'},{icon:'💰',text:'$22,400 MRR across 6 locations — top 10% account by revenue'},{icon:'⏰',text:'Master agreement renewal due in 60 days — competitor pricing shared internally'}], suggestedMove:'Escalate the open tickets immediately — service issues are the #1 churn driver for high-value accounts. Once resolved, schedule a QBR to discuss renewal terms before competitor gains traction.', cta:'Build Renewal Offer', hasWinProb:true, hasChurnRisk:true }, dealProfile:{vertical:'Enterprise Telco',product:'DIA',dealValue:22400,daysOpen:null,mtmDays:30,daysSinceContact:12} },
  { card: { type:'retention_3', label:'RETENTION', labelColor:T.yellow, mode:'Retention', account:'Clearwater Communications', tagline:'90 days silent · Contract expired · $7.2K MRR exposed', signals:[{icon:'⏰',text:'No activity in 90 days — last touch was a billing inquiry on Dec 18'},{icon:'📜',text:'MPLS contract expired 45 days ago — now month-to-month on all 3 circuits'},{icon:'📊',text:'Accounts at 90+ days silence have 74% churn rate within the next quarter'},{icon:'⚔️',text:'Spectrum Enterprise submitted a competitive quote to their procurement team'}], suggestedMove:'This is urgent — call today. Acknowledge the silence, ask about their experience. Offer a loyalty renewal with rate lock and a free bandwidth upgrade on the primary circuit.', cta:'Build Renewal Offer', hasWinProb:true, hasChurnRisk:true }, dealProfile:{vertical:'Cable MSO',product:'MPLS',dealValue:7200,daysOpen:null,mtmDays:90,daysSinceContact:90} },
]

function computeDemoScores(mode, modelData) {
  const s = {}
  DEMO_CARDS.filter(d => d.card.mode === mode).forEach(({ card, dealProfile }) => {
    if (card.hasWinProb) s[card.type] = { winProb: scoreWinProb(dealProfile, modelData), winBreakdown: buildWinBreakdown(dealProfile, modelData) }
    if (card.hasChurnRisk) s[card.type] = { ...s[card.type], churnRisk: scoreChurnRisk(dealProfile, modelData), churnBreakdown: buildChurnBreakdown(dealProfile, modelData) }
  })
  return s
}

// ── Account classification engine ─────────────────────────────
const fmt$ = n => n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : n >= 1e3 ? `$${(n/1e3).toFixed(1)}K` : `$${n}`

function classifyAccount(acct) {
  const mrr = acct.mrr || 0
  const arr = acct.arr || mrr * 12
  const pipelineMrr = acct.pipeline_mrr || 0
  const pipelineCount = acct.pipeline_count || 0
  const winRate = acct.win_rate ?? 0
  const daysSilent = acct.days_silent ?? 0
  const riskScore = acct.risk_score ?? 0
  const riskLevel = acct.risk_level || acct.health_level || 'healthy'
  const velocity = acct.velocity || 'stable'
  const vertical = acct.vertical || 'Unknown'
  const products = acct.products || []
  const churnMrr = acct.churn_mrr || 0
  const disconnects = acct.disconnects || 0
  const nrr = acct.nrr ?? 1.0

  // RETENTION
  if ((riskLevel === 'at_risk' || riskLevel === 'critical' || daysSilent > 45 || (nrr < 0.95 && mrr > 0)) && mrr > 0) {
    const mrrAtRisk = mrr
    const urgency = riskLevel === 'critical' ? 1.5 : 1.0
    const silentPenalty = Math.min(2.0, daysSilent / 30)
    const impactScore = mrrAtRisk * urgency * (1 + silentPenalty)
    const signals = []
    if (daysSilent > 30) signals.push({ icon: '⏰', text: `No contact in ${daysSilent} days — accounts go silent before they leave` })
    if (disconnects > 0) signals.push({ icon: '📉', text: `${disconnects} service disconnects on record — signals dissatisfaction` })
    if (nrr < 1.0) signals.push({ icon: '⚠️', text: `NRR at ${(nrr * 100).toFixed(0)}% — revenue contracting` })
    if (churnMrr > 0) signals.push({ icon: '💰', text: `${fmt$(churnMrr)} MRR already churned — pattern suggests more at risk` })
    if (riskScore >= 70) signals.push({ icon: '🚨', text: `Risk score ${riskScore}/100 — ${riskLevel === 'critical' ? 'immediate' : 'elevated'} churn probability` })
    if (signals.length < 2) signals.push({ icon: '🛡️', text: `${fmt$(mrrAtRisk)} MRR at risk — proactive outreach improves save rate` })
    return {
      mode: 'Retention', impactScore, signals: signals.slice(0, 4),
      tagline: `${fmt$(mrrAtRisk)} MRR at risk · ${riskLevel === 'critical' ? 'Critical' : 'Elevated'} churn signals`,
      suggestedMove: daysSilent > 45 ? `Urgent: reach out this week. ${daysSilent}+ days of silence is a strong churn predictor.` : `Schedule a check-in. Address service concerns first, then explore a renewal lock.`,
      dealProfile: { vertical, product: products[0] || 'DIA', dealValue: mrrAtRisk, daysOpen: null, mtmDays: daysSilent, daysSinceContact: daysSilent },
      hasWinProb: true, hasChurnRisk: true,
    }
  }

  // GROWTH
  if (mrr > 0 && pipelineCount > 0) {
    const dealMrr = pipelineMrr || mrr * 0.3
    const impactScore = (pipelineMrr || dealMrr) * (winRate > 0 ? winRate : 0.5) * (velocity === 'accelerating' ? 1.3 : 1.0)
    const signals = []
    if (pipelineCount > 0) signals.push({ icon: '📊', text: `${pipelineCount} active opportunities totaling ${fmt$(pipelineMrr || dealMrr)} pipeline MRR` })
    if (winRate > 0.6) signals.push({ icon: '✅', text: `Historical win rate ${(winRate * 100).toFixed(0)}% — strong conversion` })
    else if (winRate > 0) signals.push({ icon: '📊', text: `Win rate ${(winRate * 100).toFixed(0)}% at this account` })
    if (velocity === 'accelerating') signals.push({ icon: '⚡', text: 'Account velocity accelerating — momentum is on your side' })
    if (arr > 0) signals.push({ icon: '💰', text: `Current ARR ${fmt$(arr)} — expansion grows wallet share` })
    if (signals.length < 2) signals.push({ icon: '💡', text: `${fmt$(pipelineMrr || dealMrr)} in active pipeline — push to close` })
    return {
      mode: 'Growth', impactScore, signals: signals.slice(0, 4),
      tagline: `${pipelineCount} active deal${pipelineCount > 1 ? 's' : ''} · ${fmt$(pipelineMrr || dealMrr)} pipeline MRR`,
      suggestedMove: `Advance the pipeline. Leverage existing relationship (${fmt$(mrr)} MRR customer) to accelerate the ${fmt$(dealMrr)} opportunity.`,
      dealProfile: { vertical, product: products[0] || 'DIA', dealValue: dealMrr, daysOpen: 20, mtmDays: null, daysSinceContact: null },
      hasWinProb: true, hasChurnRisk: false,
    }
  }

  // PROSPECTING
  const prospectMrr = pipelineMrr || (mrr > 0 ? mrr * 0.3 : 8000)
  const impactScore = mrr === 0 ? prospectMrr * 1.2 : prospectMrr * 0.8
  const signals = []
  if (mrr === 0) signals.push({ icon: '🎯', text: 'New logo opportunity — no existing services' })
  else signals.push({ icon: '💡', text: `Existing customer (${fmt$(mrr)} MRR) with no active pipeline — whitespace opportunity` })
  if (products.length > 0 && mrr > 0) signals.push({ icon: '🔄', text: `Currently on ${products.slice(0, 2).join(', ')} — cross-sell potential` })
  if (vertical) signals.push({ icon: '🏢', text: `Vertical: ${vertical} — tailor approach to industry priorities` })
  if (signals.length < 2) signals.push({ icon: '📍', text: 'Research account needs and initiate outreach' })
  return {
    mode: 'Prospecting', impactScore, signals: signals.slice(0, 4),
    tagline: mrr > 0 ? `Existing customer · No active pipeline · Whitespace` : `New logo target · ${vertical}`,
    suggestedMove: mrr > 0 ? `This customer has ${fmt$(mrr)} MRR but no deals in flight. Start a discovery conversation.` : `Research this account. Focus on ${vertical} vertical pain points and lead with a relevant case study.`,
    dealProfile: { vertical, product: products[0] || 'Metro Ethernet', dealValue: prospectMrr, daysOpen: null, mtmDays: null, daysSinceContact: daysSilent || null },
    hasWinProb: false, hasChurnRisk: false,
  }
}

function rankAccounts(accounts, mode, modelData) {
  if (!accounts?.length) return null
  const classified = accounts.map(acct => ({ acct, ...classifyAccount(acct) }))
  const filtered = classified.filter(c => c.mode === mode)
  filtered.sort((a, b) => b.impactScore - a.impactScore)
  const top = filtered.slice(0, 5)
  if (top.length === 0) return null

  const labelMap = { Prospecting: { label: 'PROSPECTING', color: T.blue }, Growth: { label: 'GROWTH', color: T.green }, Retention: { label: 'RETENTION', color: T.yellow } }
  const ctaMap = { Prospecting: 'Draft Outreach', Growth: 'Build Quote', Retention: 'Build Renewal Offer' }

  return top.map((item, i) => {
    const id = `ranked_${i}`
    const lbl = labelMap[item.mode]
    const scores = {}
    if (item.hasWinProb) { scores.winProb = scoreWinProb(item.dealProfile, modelData); scores.winBreakdown = buildWinBreakdown(item.dealProfile, modelData) }
    if (item.hasChurnRisk) { scores.churnRisk = scoreChurnRisk(item.dealProfile, modelData); scores.churnBreakdown = buildChurnBreakdown(item.dealProfile, modelData) }
    return {
      card: {
        type: id, label: lbl.label, labelColor: lbl.color,
        account: item.acct.name || item.acct.id, tagline: item.tagline,
        signals: item.signals, suggestedMove: item.suggestedMove,
        cta: ctaMap[item.mode], ctaSecondary: item.mode === 'Growth' ? 'Build Outreach' : null,
        hasWinProb: item.hasWinProb, hasChurnRisk: item.hasChurnRisk,
      },
      scores,
    }
  })
}

  positive: [
    (n) => ({ source: 'Industry Wire', title: `${n} expands operations with new regional office opening`, sentiment: 'positive', relevance: 'medium' }),

  ],

    (n) => ({ source: 'LinkedIn', title: `${n} leadership posts about "cost optimization" — possible vendor review`, sentiment: 'risk', relevance: 'high' }),
  ],

const COMPETITOR_POOL = [
  { name: 'AT&T', statuses: ['Incumbent', 'Losing ground', 'Aggressive'] },
  { name: 'Lumen', statuses: ['Incumbent', 'At risk', 'Legacy'] },
  { name: 'Spectrum Enterprise', statuses: ['Aggressive', 'Bidding', 'Incumbent'] },
  { name: 'Comcast Business', statuses: ['Weak', 'Incumbent', 'Expanding'] },
  { name: 'Zayo', statuses: ['Aggressive', 'Bidding'] },
]

function generateIntelForAccount(acct) {
  const name = acct.name || 'Unknown', vert = acct.vertical || 'Enterprise'
  const mrr = acct.mrr || 0, riskLevel = acct.risk_level || 'healthy'
  let seed = 0; for (let i = 0; i < name.length; i++) seed = ((seed << 5) - seed + name.charCodeAt(i)) | 0
  const rand = () => { seed = (seed * 16807 + 0) % 2147483647; return (seed & 0x7fffffff) / 2147483647 }

  const pool = [...NEWS_TEMPLATES.positive]
  if (riskLevel === 'at_risk' || riskLevel === 'critical') pool.push(...NEWS_TEMPLATES.negative, ...NEWS_TEMPLATES.risk)
  else pool.push(...NEWS_TEMPLATES.opportunity)
  const shuffled = pool.sort(() => rand() - 0.5)
  const today = new Date()
  const news = shuffled.slice(0, 4).map((fn, i) => {
    const d = new Date(today); d.setDate(d.getDate() - (i * 3 + Math.floor(rand() * 5)))
    return { date: d.toISOString().slice(0, 10), ...fn(name, vert) }
  })
  const comps = COMPETITOR_POOL.sort(() => rand() - 0.5).slice(0, 2).map(c => ({
    name: c.name, status: c.statuses[Math.floor(rand() * c.statuses.length)],
    detail: `Active in ${name}'s market. ${rand() > 0.5 ? 'Contract renewal approaching.' : 'Service quality concerns reported.'}`,
  }))
  const revenue = mrr > 0 ? fmt$(mrr * 12) : fmt$(Math.round((10 + rand() * 200) * 1e6))
  return {
    news, competitors: comps,
    financials: {
      revenue, growth: riskLevel === 'critical' ? `-${Math.floor(rand()*8+2)}% YoY` : `+${Math.floor(rand()*20+5)}% YoY`,
      employees: Math.round(80 + rand() * 800), funding: rand() > 0.5 ? 'Private' : 'Public',
      techSpend: fmt$(Math.round((0.5 + rand() * 10) * 1e6)) + '/yr',
    },
  }
}

    if (!file) return
    const reader = new FileReader()
    reader.onload = (e) => {
      const text = e.target.result
      let rows
      if (file.name.endsWith('.json')) {
        try { rows = JSON.parse(text); if (!Array.isArray(rows)) rows = [rows] } catch { alert('Invalid JSON file'); return }
      } else {
        rows = parseCSV(text)
      }
      if (rows.length === 0) { alert('No data found in file'); return }
      const mapped = mapFields(rows)

        <div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:4}}>Drop CSV or JSON file here</div>
        <div style={{fontSize:12,color:T.textDim}}>or click to browse</div>
        <div style={{fontSize:11,color:T.textDim,marginTop:12}}>
          Accepts: account name, vertical, products, MRR, pipeline, win rate, risk level, days silent, NRR
        </div>
      </div>

      {/* Sample data toggle */}
      <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
        <button onClick={()=>setShowSample(!showSample)} style={{background:T.bg2,border:`1px solid ${T.border}`,color:T.textMid,padding:'8px 14px',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
          {showSample ? 'Hide' : 'Show'} sample CSV format
        </button>
        <button onClick={()=>{const mapped=mapFields(parseCSV(SAMPLE_CSV));onImport(mapped)}} style={{background:`${T.accent}15`,border:`1px solid ${T.accent}40`,color:T.accent,padding:'8px 14px',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
          Load sample data
        </button>
        {accounts.length > 0 && (
          <button onClick={onClear} style={{background:`${T.red}15`,border:`1px solid ${T.red}40`,color:T.red,padding:'8px 14px',borderRadius:6,fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>
            Clear all ({accounts.length})
          </button>
        )}
      </div>

      {/* Sample CSV */}
      {showSample && (
        <div style={{marginTop:12,background:T.bg,border:`1px solid ${T.border}`,borderRadius:8,padding:16}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:11,color:T.textDim,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.08em',textTransform:'uppercase'}}>SAMPLE CSV</span>
            <button onClick={()=>{navigator.clipboard.writeText(SAMPLE_CSV)}} style={{background:'transparent',border:`1px solid ${T.border}`,color:T.textMid,padding:'4px 10px',borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:"'JetBrains Mono',monospace"}}>Copy</button>
          </div>
          <pre style={{fontSize:11,color:T.textMid,fontFamily:"'JetBrains Mono',monospace",whiteSpace:'pre-wrap',wordBreak:'break-all',lineHeight:1.6,margin:0}}>{SAMPLE_CSV}</pre>
        </div>
      )}

      {/* Current accounts table */}
      {accounts.length > 0 && (
        <div style={{marginTop:20}}>
          <div style={{fontSize:11,color:T.textDim,fontFamily:"'JetBrains Mono',monospace",letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}}>
            YOUR ACCOUNTS ({accounts.length})
          </div>
          <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,overflow:'auto',maxHeight:400}}>
            <table className="data-table">
              <thead>
                <tr>
                  <th>Account</th><th>Vertical</th><th>Products</th><th>MRR</th><th>Pipeline</th><th>Risk</th><th>Silent</th><th></th>
                </tr>
              </thead>
              <tbody>
                {accounts.map((a,i) => (
                  <tr key={a.id || i}>
                    <td style={{color:T.text,fontWeight:500}}>{a.name}</td>
                    <td>{a.vertical || '—'}</td>
                    <td style={{fontSize:11}}>{Array.isArray(a.products) ? a.products.join(', ') : a.products || '—'}</td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace"}}>{a.mrr ? fmt$(a.mrr) : '—'}</td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace"}}>{a.pipeline_mrr ? fmt$(a.pipeline_mrr) : '—'}</td>
                    <td>
                      {a.risk_level && a.risk_level !== 'healthy' ? (
                        <span style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,padding:'2px 6px',borderRadius:3,color:a.risk_level==='critical'?T.red:T.yellow,background:(a.risk_level==='critical'?T.red:T.yellow)+'15'}}>{a.risk_level}</span>
                      ) : <span style={{color:T.green,fontSize:10}}>●</span>}
                    </td>
                    <td style={{fontFamily:"'JetBrains Mono',monospace"}}>{a.days_silent || 0}d</td>
                    <td>
                      <button onClick={(e)=>{e.stopPropagation();onDeleteAccount(a.id)}} style={{background:'transparent',border:'none',color:T.red,cursor:'pointer',fontSize:14,padding:4,opacity:0.6}} title="Remove">×</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:8,fontSize:11,color:T.textDim}}>
            Total MRR: <span style={{color:T.accent,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{fmt$(accounts.reduce((s,a)=>s+(a.mrr||0),0))}</span>
            {' · '}Pipeline: <span style={{color:T.green,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{fmt$(accounts.reduce((s,a)=>s+(a.pipeline_mrr||0),0))}</span>
            {' · '}At risk: <span style={{color:T.red,fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{accounts.filter(a=>a.risk_level==='at_risk'||a.risk_level==='critical').length}</span>
          </div>
        </div>
      )}
    </div>
  )
}

// ── Main App ──────────────────────────────────────────────────
function SellerActions() {
  const [tab, setTab] = useState('actions')
  const [active, setActive] = useState(null)
  const [steeringMode, setSteeringMode] = useState('Prospecting')
  const [modelData] = useState(DEMO_MODEL)
  const [accounts, setAccounts] = useState(loadAccounts)
  const [intelData, setIntelData] = useState({})
  const [refreshingAccount, setRefreshingAccount] = useState(null)

  const useUserData = accounts.length > 0
  modelSource = useUserData ? 'user' : 'demo'

  // Save to localStorage when accounts change
  useEffect(() => { saveAccounts(accounts) }, [accounts])

  // Build cards from user data or demo
  const { cards, scores } = useMemo(() => {
    if (useUserData) {
      const ranked = rankAccounts(accounts, steeringMode, modelData)
      if (!ranked) return { cards: [], scores: {} }
      const c = ranked.map(r => r.card)
      const s = {}; ranked.forEach(r => { s[r.card.type] = r.scores })
      return { cards: c, scores: s }
    }
    const demoFiltered = DEMO_CARDS.filter(d => d.card.mode === steeringMode).map(d => d.card)
    return { cards: demoFiltered, scores: computeDemoScores(steeringMode, modelData) }
  }, [accounts, modelData, steeringMode, useUserData])

  useEffect(() => { if (cards.length > 0) setActive(cards[0].type) }, [steeringMode, cards.length > 0])

  const modes = [
    { label: 'Prospecting', color: T.blue },
    { label: 'Growth', color: T.green },
    { label: 'Retention', color: T.yellow },
  ]

  const handleImport = (newAccounts) => {
    setAccounts(prev => {
      const existing = new Set(prev.map(a => a.name?.toLowerCase()))
      const unique = newAccounts.filter(a => !existing.has(a.name?.toLowerCase()))
      return [...prev, ...unique]
    })
    setTab('actions')
  }

  const handleRefreshIntel = (accountName) => {
    setRefreshingAccount(accountName)
    setTimeout(() => {
      const acct = accounts.find(a => a.name === accountName)
      const target = acct || { name: accountName, vertical: 'Enterprise', mrr: 10000 }
      setIntelData(prev => ({ ...prev, [accountName]: generateIntelForAccount(target) }))
      setRefreshingAccount(null)
    }, 1200)
  }

  const handleToggleIntel = (accountName) => {
    if (intelData[accountName]) {
      setIntelData(prev => { const next = { ...prev }; delete next[accountName]; return next })
    } else {
      handleRefreshIntel(accountName)
    }
  }

  const summaryStats = useMemo(() => {
    if (!useUserData) return null
    const totalMrr = accounts.reduce((s,a) => s + (a.mrr || 0), 0)
    const atRisk = accounts.filter(a => a.risk_level === 'at_risk' || a.risk_level === 'critical' || (a.days_silent || 0) > 45).length
    const pipeline = accounts.reduce((s,a) => s + (a.pipeline_mrr || 0), 0)
    const prospects = accounts.filter(a => !a.mrr && !a.pipeline_mrr).length
    return { totalMrr, atRisk, pipeline, prospects, total: accounts.length }
  }, [accounts, useUserData])

  return (
    <div style={{minHeight:'100vh'}}>
      <div style={{padding:'28px 20px',maxWidth:920,margin:'0 auto'}}>

        {/* Header */}
        <div style={{marginBottom:20}}>
          <h1 style={{fontSize:22,fontWeight:700,color:T.text,margin:0,letterSpacing:'-0.03em'}}>
            Your Priority Actions
          </h1>
          <p style={{fontSize:13,color:T.textDim,marginTop:6,marginBottom:0}}>
            {useUserData ? `${accounts.length} accounts loaded · Ranked by impact` : 'Demo mode · Upload accounts to activate AI prioritization'}
          </p>
        </div>

        {/* Summary stats bar (when user data loaded) */}
        {summaryStats && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
            {[
              { label: 'Total MRR', value: fmt$(summaryStats.totalMrr), color: T.accent },
              { label: 'Pipeline', value: fmt$(summaryStats.pipeline), color: T.green },
              { label: 'At Risk', value: summaryStats.atRisk, color: T.red },
              { label: 'Accounts', value: summaryStats.total, color: T.textMid },
            ].map((s,i) => (
              <div key={i} style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:8,padding:'12px 14px',textAlign:'center'}}>
                <div style={{fontSize:20,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",color:s.color}}>{s.value}</div>
                <div style={{fontSize:10,color:T.textDim,textTransform:'uppercase',letterSpacing:'0.08em',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>
        )}

        {/* Tabs */}
        <div className="tab-bar">
          <button className={cn('tab-btn', tab==='actions' && 'active')} onClick={()=>setTab('actions')}>
            🎯 Actions {useUserData && `(${cards.length})`}
          </button>
          <button className={cn('tab-btn', tab==='data' && 'active')} onClick={()=>setTab('data')}>
            📂 Account Data {accounts.length > 0 && `(${accounts.length})`}
          </button>
        </div>

        {/* Data tab */}
        {tab === 'data' && (
          <DataManager
            accounts={accounts}
            onImport={handleImport}
            onClear={() => { setAccounts([]); localStorage.removeItem(STORAGE_KEY) }}
            onDeleteAccount={(id) => setAccounts(prev => prev.filter(a => a.id !== id))}
          />
        )}

        {/* Actions tab */}
        {tab === 'actions' && (
          <>
            {/* Mode banner */}
            {!useUserData && (
              <div style={{borderRadius:8,padding:'8px 14px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center',background:`${T.yellow}10`,border:`1px solid ${T.yellow}30`}}>
                <span style={{fontSize:11,color:T.yellow,fontFamily:"'JetBrains Mono',monospace"}}>
                  ⚠ DEMO MODE — go to Account Data tab to upload your accounts
                </span>
                <button onClick={()=>setTab('data')} style={{background:`${T.accent}15`,border:`1px solid ${T.accent}40`,color:T.accent,padding:'4px 12px',borderRadius:4,fontSize:11,cursor:'pointer',fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>Upload</button>
              </div>
            )}

            {/* Steering bar */}
            <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:10,padding:'12px 16px',display:'flex',alignItems:'center',gap:12,marginBottom:24,flexWrap:'wrap'}}>
              <span style={{fontSize:11,color:T.textDim,letterSpacing:'0.08em',textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace"}}>MODE</span>
              {modes.map(m => (
                <button key={m.label} onClick={()=>setSteeringMode(m.label)}
                  style={{borderRadius:20,padding:'5px 14px',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit',display:'flex',alignItems:'center',gap:6,
                    background:steeringMode===m.label?`${m.color}15`:'transparent',
                    border:steeringMode===m.label?`1px solid ${m.color}50`:`1px solid ${T.border}`,
                    color:steeringMode===m.label?m.color:T.textDim
                  }}>
                  {m.label}
                </button>
              ))}
              <div style={{marginLeft:'auto',fontSize:12,color:T.textDim,fontFamily:"'JetBrains Mono',monospace"}}>
                {new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
              </div>
            </div>

            {/* Cards */}
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {cards.map(card => (
                <ActionCard key={card.type} content={card} scores={scores[card.type]} active={active===card.type} onClick={()=>setActive(active===card.type?null:card.type)}
                  marketIntel={intelData[card.account]} onRefreshIntel={handleRefreshIntel} refreshingIntel={refreshingAccount===card.account} showIntel={!!intelData[card.account]} onToggleIntel={handleToggleIntel} />
              ))}
              {cards.length === 0 && (
                <div style={{background:T.bg2,border:`1px solid ${T.border}`,borderRadius:12,padding:'40px 20px',textAlign:'center'}}>
                  <div style={{fontSize:14,color:T.textDim}}>No accounts in <strong style={{color:T.text}}>{steeringMode}</strong> mode</div>
                  <div style={{fontSize:12,color:T.textDim,marginTop:6}}>Try switching modes or upload more accounts</div>
                </div>
              )}
            </div>

            {/* Legend */}
            <div style={{marginTop:24,display:'flex',gap:20,flexWrap:'wrap',alignItems:'center'}}>
              {[{color:T.purple,label:'Win / Save Probability'},{color:T.red,label:'Churn Risk Score'}].map(l => (
                <div key={l.label} style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:2,background:l.color}} />
                  <span style={{fontSize:11,color:T.textDim}}>{l.label}</span>
                </div>
              ))}
              <span style={{fontSize:11,color:T.textDim,marginLeft:'auto'}}>Hover badges to see signal breakdown</span>
            </div>

            {/* Data stored locally notice */}
            <div style={{marginTop:16,padding:'8px 14px',borderRadius:6,background:`${T.green}08`,border:`1px solid ${T.green}20`,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:12}}>🔒</span>
              <span style={{fontSize:11,color:T.textDim}}>
                All account data is stored locally in your browser. Nothing is sent to any server.
              </span>
            </div>
          </>
        )}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<SellerActions />)
</script>
</body>
</html>
