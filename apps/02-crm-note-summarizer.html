<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Note Summarizer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080B12;--bg2:#0D1117;--bg3:#161B22;
  --accent:#4ADE80;--accent-dim:rgba(74,222,128,0.08);--accent-bdr:rgba(74,222,128,0.2);
  --text:#E6EDF3;--text2:#A0A8B4;--text3:#7A8494;
  --bdr:rgba(230,237,243,0.06);--bdr-h:rgba(230,237,243,0.13);
  --glass:rgba(230,237,243,0.02);
  --green:#3FB950;--blue:#58A6FF;--purple:#D2A8FF;--red:#F85149;--yellow:#E3B341;--orange:#F0883E;
}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;opacity:0.025;pointer-events:none;z-index:50;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;position:sticky;top:0;z-index:100;background:rgba(8,11,18,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border:1.5px solid var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo span{font-family:Georgia,serif;font-size:15px;letter-spacing:-0.3px}
.settings-toggle{background:transparent;border:1px solid var(--bdr);color:var(--text2);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.settings-toggle:hover{border-color:var(--accent);color:var(--accent)}

.settings{background:var(--bg2);border-bottom:1px solid var(--bdr);max-height:0;overflow:hidden;transition:max-height .3s}
.settings.open{max-height:280px}
.settings-inner{padding:20px 28px;display:grid;grid-template-columns:160px 1fr;gap:10px;align-items:center;max-width:640px}
.settings-inner label{font-size:12px;color:var(--text2)}
.settings-inner select,.settings-inner input{background:var(--glass);border:1px solid var(--bdr);color:var(--text);padding:8px 12px;border-radius:7px;font-size:12px;font-family:inherit;width:100%;outline:none}
.settings-inner select:focus,.settings-inner input:focus{border-color:var(--accent-bdr)}
.key-status{font-size:10px;font-family:'JetBrains Mono',monospace;margin-top:3px}
.key-status.ok{color:var(--green)}.key-status.no{color:var(--red)}

.container{max-width:960px;margin:0 auto;padding:28px}
.section-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);font-weight:600;margin-bottom:10px}

textarea,select{width:100%;background:var(--bg2);border:1px solid var(--bdr);color:var(--text);padding:14px 16px;border-radius:10px;font-family:inherit;font-size:14px;resize:vertical;transition:border-color .2s}
textarea:focus,select:focus{outline:none;border-color:var(--accent-bdr);box-shadow:0 0 0 3px rgba(74,222,128,0.06)}
.notes-input{min-height:200px;font-size:13px;line-height:1.7}
.input-hint{font-size:11px;color:var(--text3);margin-top:6px}

/* Source type tabs */
.source-tabs{display:flex;gap:4px;margin-bottom:12px}
.source-tab{background:var(--glass);border:1px solid var(--bdr);color:var(--text2);padding:8px 16px;border-radius:7px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .2s}
.source-tab:hover{border-color:var(--bdr-h)}
.source-tab.active{background:var(--accent-dim);border-color:var(--accent-bdr);color:var(--accent)}

/* Options row */
.options-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.form-group label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:6px;font-weight:500}

/* Generate */
.gen-btn{background:var(--accent);color:#000;border:none;padding:14px 32px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;width:100%;transition:all .2s;font-family:inherit}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(74,222,128,0.2)}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Output tabs */
.output-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--bdr);padding-bottom:12px}
.output-tab{background:transparent;border:1px solid transparent;color:var(--text3);padding:7px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:all .2s}
.output-tab:hover{color:var(--text2)}
.output-tab.active{background:var(--accent-dim);border-color:var(--accent-bdr);color:var(--accent)}

/* Output sections */
.output-panel{display:none}
.output-panel.active{display:block;animation:fadeUp .35s ease}

.section-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:14px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg3);border-bottom:1px solid var(--bdr)}
.section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accent)}
.copy-btn{background:transparent;border:1px solid var(--bdr);color:var(--text2);padding:4px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;transition:all .2s}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.section-body{padding:16px 20px;font-size:13px;line-height:1.75;white-space:pre-wrap;color:var(--text)}

/* MEDDIC gaps */
.meddic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;padding:16px 20px}
.meddic-item{background:var(--glass);border:1px solid var(--bdr);border-radius:8px;padding:12px 14px}
.meddic-item.found{border-left:3px solid var(--green)}
.meddic-item.missing{border-left:3px solid var(--red)}
.meddic-item.partial{border-left:3px solid var(--yellow)}
.meddic-letter{font-size:18px;font-weight:700;font-family:Georgia,serif;margin-bottom:2px}
.meddic-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px}
.meddic-value{font-size:12px;line-height:1.5;color:var(--text2)}
.meddic-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-top:6px}

/* Sentiment */
.sentiment-bar{display:flex;align-items:center;gap:16px;padding:16px 20px}
.sentiment-meter{flex:1;height:8px;border-radius:4px;background:var(--bg3);overflow:hidden;position:relative}
.sentiment-fill{height:100%;border-radius:4px;transition:width .6s ease}
.sentiment-signals{padding:0 20px 16px}
.signal{display:flex;align-items:start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)}
.signal:last-child{border-bottom:none}
.signal-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.signal-text{font-size:12px;color:var(--text2);line-height:1.5}
.signal-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:2px 6px;border-radius:3px;margin-left:auto;flex-shrink:0}

/* Copy all */
.copy-all{background:var(--bg2);border:1px solid var(--bdr);color:var(--text);padding:12px 20px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;width:100%;text-align:center;transition:all .2s;margin-top:8px}
.copy-all:hover{border-color:var(--accent);color:var(--accent)}

.loading{text-align:center;padding:48px}
.spinner{width:28px;height:28px;border:2.5px solid var(--bdr);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
.error{background:rgba(248,81,73,0.06);border:1px solid rgba(248,81,73,0.15);color:var(--red);padding:14px 16px;border-radius:10px;font-size:13px;margin-top:16px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app-header">
  <div class="logo"><div class="logo-mark">📋</div><span>CRM Summarizer</span></div>
  <button class="settings-toggle" onclick="document.getElementById('settings').classList.toggle('open')">⚙ Settings</button>
</div>

<div class="settings" id="settings">
  <div class="settings-inner">
    <label>AI Provider</label>
    <select id="provider" onchange="saveSettings()"><option value="openai">OpenAI (GPT-4o)</option><option value="anthropic">Anthropic (Claude)</option></select>
    <label>API Key</label>
    <div><input type="password" id="apiKey" placeholder="Enter your API key..." oninput="saveSettings()"><div class="key-status" id="keyStatus"></div></div>
    <label>CRM Platform</label>
    <select id="crmPlatform" onchange="saveSettings()"><option value="salesforce">Salesforce</option><option value="hubspot">HubSpot</option><option value="generic">Generic CRM</option></select>
    <label>Deal Framework</label>
    <select id="framework" onchange="saveSettings()"><option value="meddic">MEDDIC</option><option value="meddpicc">MEDDPICC</option><option value="bant">BANT</option><option value="spiced">SPICED</option></select>
  </div>
</div>

<div class="container">

  <!-- SOURCE TYPE -->
  <div style="margin-bottom:24px">
    <div class="section-label">Input Source</div>
    <div class="source-tabs">
      <button class="source-tab active" onclick="setSource('notes',this)">📝 Call Notes</button>
      <button class="source-tab" onclick="setSource('transcript',this)">🎙️ Transcript (Gong/Otter)</button>
      <button class="source-tab" onclick="setSource('email',this)">📧 Email Thread</button>
      <button class="source-tab" onclick="setSource('multi',this)">📚 Multiple Sources</button>
    </div>
    <textarea class="notes-input" id="notesInput" placeholder="Paste your raw call notes here...

Don't worry about formatting — the messier the better. That's the whole point.

Examples of what works:
• Stream-of-consciousness notes you scribbled during the call
• Copy-paste from a notepad
• Bullet points mixed with sentences
• Partial thoughts and abbreviations

The AI will structure everything into clean CRM fields."></textarea>
    <div class="input-hint" id="inputHint">Tip: The more detail you include, the better the MEDDIC gap analysis will be.</div>
  </div>

  <!-- OPTIONS -->
  <div class="options-row">
    <div class="form-group">
      <label>Meeting Type</label>
      <select id="meetingType">
        <option value="discovery">Discovery Call</option>
        <option value="demo">Demo / Presentation</option>
        <option value="negotiation">Negotiation / Pricing</option>
        <option value="followup">Follow-up</option>
        <option value="checkin">Check-in / QBR</option>
        <option value="internal">Internal Meeting</option>
      </select>
    </div>
    <div class="form-group">
      <label>Detail Level</label>
      <select id="detailLevel">
        <option value="concise">Concise (quick log)</option>
        <option value="standard" selected>Standard</option>
        <option value="detailed">Detailed (full writeup)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Include</label>
      <select id="extras">
        <option value="all" selected>Everything (summary + MEDDIC + sentiment)</option>
        <option value="summary">Summary only</option>
        <option value="meddic">Summary + MEDDIC gaps</option>
        <option value="sentiment">Summary + Sentiment</option>
      </select>
    </div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generate()">Summarize & Analyze</button>

  <div id="output" style="margin-top:28px"></div>
</div>

<!-- POSTMESSAGE BRIDGE -->
<script>
(function(){
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='salesai-key-delivery'){
      if(e.data.key&&e.data.provider){
        var pe=document.getElementById('provider');if(pe)pe.value=e.data.provider;
        var ke=document.getElementById('apiKey');if(ke)ke.value=e.data.key;
        if(typeof saveSettings==='function')saveSettings();
        if(typeof updateKeyStatus==='function')updateKeyStatus();
      }
    }
  });
  if(window.parent!==window){
    window.parent.postMessage({type:'salesai-key-request',provider:'openai'},'*');
    setTimeout(function(){window.parent.postMessage({type:'salesai-key-request',provider:'anthropic'},'*');},100);
  }
})();
</script>

<script>
var currentSource='notes';

function setSource(type,btn){
  currentSource=type;
  document.querySelectorAll('.source-tab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  var ta=document.getElementById('notesInput');
  var hint=document.getElementById('inputHint');
  if(type==='notes'){
    ta.placeholder='Paste your raw call notes here...\n\nStream-of-consciousness, bullet points, abbreviations — anything goes.\nThe AI will structure everything into clean CRM fields.';
    hint.textContent='Tip: Include names, numbers, dates, and next steps for the best output.';
  }else if(type==='transcript'){
    ta.placeholder='Paste your call transcript here (from Gong, Chorus, Otter, Fireflies, etc.)...\n\nThe AI will identify speakers, extract key moments, and summarize.\n\nFull transcripts work great — even 30-60 minute calls.\nSpeaker labels like "Rep:" and "Prospect:" help but aren\'t required.';
    hint.textContent='Tip: Gong/Otter transcripts paste directly. The AI identifies speaker turns automatically.';
  }else if(type==='email'){
    ta.placeholder='Paste the email thread here...\n\nInclude all replies and forwards. The AI will parse the thread,\nextract commitments and next steps, and format for your CRM.';
    hint.textContent='Tip: Select-all and paste from your email client. Headers and signatures are handled automatically.';
  }else{
    ta.placeholder='Paste multiple sources here — separate them with a line of dashes (---)\n\nExample:\n[Call notes from discovery]\n...\n---\n[Follow-up email thread]\n...\n---\n[Slack messages from champion]\n...\n\nThe AI will synthesize everything into one unified CRM record.';
    hint.textContent='Tip: Separate each source with --- on its own line. Label each source for best results.';
  }
}

function saveSettings(){
  try{localStorage.setItem('salesai_crmnotes',JSON.stringify({
    provider:document.getElementById('provider').value,
    apiKey:document.getElementById('apiKey').value,
    crm:document.getElementById('crmPlatform').value,
    framework:document.getElementById('framework').value
  }));}catch(e){}
  updateKeyStatus();
}
function loadSettings(){
  try{var s=JSON.parse(localStorage.getItem('salesai_crmnotes')||'{}');
    if(s.provider)document.getElementById('provider').value=s.provider;
    if(s.apiKey)document.getElementById('apiKey').value=s.apiKey;
    if(s.crm)document.getElementById('crmPlatform').value=s.crm;
    if(s.framework)document.getElementById('framework').value=s.framework;
  }catch(e){}
  updateKeyStatus();
}
function updateKeyStatus(){
  var k=document.getElementById('apiKey').value,el=document.getElementById('keyStatus');
  if(!k){el.className='key-status no';el.textContent='⚠ No API key — add in Settings';}
  else{el.className='key-status ok';el.textContent='✓ Key saved locally';}
}

async function callAI(prompt,system){
  var provider=document.getElementById('provider').value;
  var key=document.getElementById('apiKey').value;
  if(!key)throw new Error('Please add your API key in Settings.');
  if(provider==='openai'){
    var r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'gpt-4o',messages:[{role:'system',content:system},{role:'user',content:prompt}],temperature:0.3,max_tokens:4000})});
    if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error(e.error?.message||'OpenAI error: '+r.status);}
    return(await r.json()).choices[0].message.content;
  }else{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,system:system,messages:[{role:'user',content:prompt}]})});
    if(!r.ok){var e=await r.json().catch(function(){return{};});throw new Error(e.error?.message||'Anthropic error: '+r.status);}
    return(await r.json()).content[0].text;
  }
}

async function generate(){
  var notes=document.getElementById('notesInput').value.trim();
  if(!notes){alert('Please paste your notes or transcript.');return;}
  var meetingType=document.getElementById('meetingType').value;
  var detail=document.getElementById('detailLevel').value;
  var extras=document.getElementById('extras').value;
  var crm=document.getElementById('crmPlatform').value;
  var framework=document.getElementById('framework').value;

  var btn=document.getElementById('genBtn'),output=document.getElementById('output');
  btn.disabled=true;btn.textContent='Analyzing...';
  output.innerHTML='<div class="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text2)">Reading input, extracting data, checking '+framework.toUpperCase()+' gaps...</div></div>';

  var frameworkFields={
    meddic:{letters:['M','E','D','D','I','C'],names:['Metrics','Economic Buyer','Decision Criteria','Decision Process','Identify Pain','Champion']},
    meddpicc:{letters:['M','E','D','D','P','I','C','C'],names:['Metrics','Economic Buyer','Decision Criteria','Decision Process','Paper Process','Identify Pain','Champion','Competition']},
    bant:{letters:['B','A','N','T'],names:['Budget','Authority','Need','Timeline']},
    spiced:{letters:['S','P','I','C','E','D'],names:['Situation','Pain','Impact','Critical Event','Decision','(none)']}
  };
  var fw=frameworkFields[framework]||frameworkFields.meddic;

  var includeMeddic=extras==='all'||extras==='meddic';
  var includeSentiment=extras==='all'||extras==='sentiment';

  var system='You are an expert sales operations analyst. You take raw, unstructured input (call notes, transcripts, emails, or multiple sources) and produce perfectly structured CRM records with deal intelligence.\n\nCRM Platform: '+crm+'\nDeal Framework: '+framework.toUpperCase()+'\nSource type: '+currentSource+'\nMeeting type: '+meetingType+'\nDetail level: '+detail+'\n\nRespond in this exact JSON format (no markdown, no backticks, raw JSON only):\n{\n  "crm_record": {\n    "subject": "Meeting subject line for CRM activity record",\n    "date": "Meeting date if mentioned, or Today",\n    "participants": "Names and roles of people involved",\n    "type": "'+meetingType+'",\n    "summary": "2-3 sentence executive summary",\n    "key_points": "Bullet-pointed key discussion items (use • for bullets, one per line)",\n    "action_items": "Numbered list of next steps with owners and dates where mentioned",\n    "deal_intelligence": "Key deal info: budget, timeline, decision makers, competition, risks",\n    "follow_up": "Recommended follow-up date/action"\n  },\n  "formatted": {\n    "salesforce": "Complete Salesforce Activity Description field (structured text with sections)",\n    "hubspot": "HubSpot note format (structured with headers)",\n    "slack": "Concise Slack #deals-update post (emoji-rich, scannable, 4-6 lines max)",\n    "email_recap": "Professional recap email to send to the prospect confirming what was discussed and next steps"\n  }'+(includeMeddic?',\n  "framework_analysis": [\n    {\n      "letter": "M",\n      "name": "Metrics",\n      "status": "found | partial | missing",\n      "detail": "What was found or what is missing. Be specific."\n    }\n  ]':'')+(includeSentiment?',\n  "sentiment": {\n    "overall_score": 72,\n    "label": "Engaged but cautious",\n    "signals": [\n      {\n        "type": "buying_signal | red_flag | neutral",\n        "icon": "🟢 or 🔴 or 🟡",\n        "text": "What was observed and what it means"\n      }\n    ]\n  }':'')+'\n}\n\n'+(includeMeddic?'For framework_analysis, evaluate each letter of '+framework.toUpperCase()+':\n'+fw.letters.map(function(l,i){return '- '+l+' = '+fw.names[i];}).join('\n')+'\nMark each as found (clearly discussed), partial (mentioned but incomplete), or missing (not addressed at all). Be specific about what was said or what\'s missing.\n\n':'')+(includeSentiment?'For sentiment, score from 0-100 (0=hostile/dead deal, 50=neutral, 100=ready to buy). Identify 3-6 specific signals from the conversation — things the prospect said or did that indicate their engagement level, buying intent, or concerns.\n\n':'')+'Guidelines:\n- Extract EVERY actionable detail — don\'t lose information\n- If this is a transcript, identify speaker turns and attribute quotes\n- If this is multiple sources, synthesize into one unified record\n- The Slack format should be concise and emoji-rich (🎯 📞 ⚡ ✅ 🚩)\n- The email recap should be professional and confirmatory, not salesy\n- Flag any competitors mentioned\n- Note any specific numbers (budget, timeline, team size, etc.)';

  var prompt='Source type: '+currentSource+'\n\nInput:\n"""\n'+notes+'\n"""';

  try{
    var raw=await callAI(prompt,system);
    var p;
    try{p=JSON.parse(raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim());}
    catch(e){var m=raw.match(/\{[\s\S]*\}/);if(m)p=JSON.parse(m[0]);else throw new Error('Parse error. Try again.');}

    window._data=p;
    var html='';

    // Output tabs
    var tabs=[{id:'crm',label:'📋 CRM Record'},{id:'salesforce',label:'☁️ Salesforce'},{id:'hubspot',label:'🟠 HubSpot'},{id:'slack',label:'💬 Slack'},{id:'email',label:'📧 Email Recap'}];
    if(includeMeddic)tabs.push({id:'framework',label:'🎯 '+framework.toUpperCase()+' Gaps'});
    if(includeSentiment)tabs.push({id:'sentiment',label:'📊 Sentiment'});

    html+='<div class="output-tabs" id="outputTabs">';
    tabs.forEach(function(t,i){
      html+='<button class="output-tab'+(i===0?' active':'')+'" onclick="switchTab(\''+t.id+'\',this)">'+t.label+'</button>';
    });
    html+='</div>';

    // CRM Record panel
    var cr=p.crm_record;
    html+='<div class="output-panel active" id="panel-crm">';
    var crmSections=[['Subject',cr.subject],['Date & Type',cr.date+' — '+cr.type],['Participants',cr.participants],['Summary',cr.summary],['Key Points',cr.key_points],['Action Items',cr.action_items],['Deal Intelligence',cr.deal_intelligence],['Follow-up',cr.follow_up]];
    crmSections.forEach(function(s,i){
      html+='<div class="section-card"><div class="section-header"><span class="section-title">'+s[0]+'</span><button class="copy-btn" onclick="copyText(\'crm-'+i+'\',this)">Copy</button></div><div class="section-body" id="crm-'+i+'">'+s[1]+'</div></div>';
    });
    html+='<button class="copy-all" onclick="copyFullCRM()">📋 Copy Full CRM Record</button>';
    html+='</div>';

    // Salesforce panel
    html+='<div class="output-panel" id="panel-salesforce"><div class="section-card"><div class="section-header"><span class="section-title">Salesforce Activity Description</span><button class="copy-btn" onclick="copyText(\'sf-body\',this)">Copy</button></div><div class="section-body" id="sf-body">'+p.formatted.salesforce+'</div></div></div>';

    // HubSpot panel
    html+='<div class="output-panel" id="panel-hubspot"><div class="section-card"><div class="section-header"><span class="section-title">HubSpot Note</span><button class="copy-btn" onclick="copyText(\'hs-body\',this)">Copy</button></div><div class="section-body" id="hs-body">'+p.formatted.hubspot+'</div></div></div>';

    // Slack panel
    html+='<div class="output-panel" id="panel-slack"><div class="section-card"><div class="section-header"><span class="section-title">Slack #deals-update</span><button class="copy-btn" onclick="copyText(\'sl-body\',this)">Copy</button></div><div class="section-body" id="sl-body" style="font-size:14px">'+p.formatted.slack+'</div></div></div>';

    // Email recap panel
    html+='<div class="output-panel" id="panel-email"><div class="section-card"><div class="section-header"><span class="section-title">Recap Email to Prospect</span><button class="copy-btn" onclick="copyText(\'em-body\',this)">Copy</button></div><div class="section-body" id="em-body">'+p.formatted.email_recap+'</div></div></div>';

    // MEDDIC panel
    if(includeMeddic&&p.framework_analysis){
      html+='<div class="output-panel" id="panel-framework"><div class="section-card"><div class="section-header"><span class="section-title">'+framework.toUpperCase()+' Gap Analysis</span></div><div class="meddic-grid">';
      p.framework_analysis.forEach(function(item){
        var statusColor=item.status==='found'?'var(--green)':item.status==='partial'?'var(--yellow)':'var(--red)';
        var statusLabel=item.status==='found'?'✓ Covered':item.status==='partial'?'◐ Partial':'✗ Missing';
        html+='<div class="meddic-item '+item.status+'">';
        html+='<div class="meddic-letter" style="color:'+statusColor+'">'+item.letter+'</div>';
        html+='<div class="meddic-label">'+item.name+'</div>';
        html+='<div class="meddic-value">'+item.detail+'</div>';
        html+='<div class="meddic-status" style="color:'+statusColor+'">'+statusLabel+'</div>';
        html+='</div>';
      });
      html+='</div></div></div>';
    }

    // Sentiment panel
    if(includeSentiment&&p.sentiment){
      var s=p.sentiment;
      var barColor=s.overall_score>=70?'var(--green)':s.overall_score>=40?'var(--yellow)':'var(--red)';
      html+='<div class="output-panel" id="panel-sentiment"><div class="section-card">';
      html+='<div class="section-header"><span class="section-title">Conversation Sentiment</span></div>';
      html+='<div class="sentiment-bar">';
      html+='<div style="text-align:center;min-width:60px"><div style="font-family:Georgia,serif;font-size:28px;color:'+barColor+';letter-spacing:-1px">'+s.overall_score+'</div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px">Score</div></div>';
      html+='<div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px">'+s.label+'</div><div class="sentiment-meter"><div class="sentiment-fill" style="width:'+s.overall_score+'%;background:'+barColor+'"></div></div></div>';
      html+='</div>';
      if(s.signals&&s.signals.length){
        html+='<div class="sentiment-signals">';
        s.signals.forEach(function(sig){
          var typeColor=sig.type==='buying_signal'?'var(--green)':sig.type==='red_flag'?'var(--red)':'var(--yellow)';
          var typeLabel=sig.type==='buying_signal'?'Buying Signal':sig.type==='red_flag'?'Red Flag':'Neutral';
          html+='<div class="signal">';
          html+='<div class="signal-icon">'+sig.icon+'</div>';
          html+='<div class="signal-text">'+sig.text+'</div>';
          html+='<span class="signal-type" style="background:'+typeColor+'14;color:'+typeColor+'">'+typeLabel+'</span>';
          html+='</div>';
        });
        html+='</div>';
      }
      html+='</div></div>';
    }

    output.innerHTML=html;
  }catch(e){
    output.innerHTML='<div class="error">⚠ '+e.message+'</div>';
  }
  btn.disabled=false;btn.textContent='Summarize & Analyze';
}

function switchTab(id,btn){
  document.querySelectorAll('.output-tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.output-panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  var panel=document.getElementById('panel-'+id);
  if(panel)panel.classList.add('active');
}

function copyText(id,btn){
  var el=document.getElementById(id);
  if(el)navigator.clipboard.writeText(el.textContent);
  btn.textContent='Copied!';setTimeout(function(){btn.textContent='Copy';},1500);
}

function copyFullCRM(){
  var d=window._data;if(!d)return;
  var cr=d.crm_record;
  var text='SUBJECT: '+cr.subject+'\nDATE: '+cr.date+'\nTYPE: '+cr.type+'\nPARTICIPANTS: '+cr.participants+'\n\nSUMMARY\n'+cr.summary+'\n\nKEY POINTS\n'+cr.key_points+'\n\nACTION ITEMS\n'+cr.action_items+'\n\nDEAL INTELLIGENCE\n'+cr.deal_intelligence+'\n\nFOLLOW-UP\n'+cr.follow_up;
  navigator.clipboard.writeText(text);
  var btn=document.querySelector('.copy-all');
  btn.textContent='✓ Copied full record!';setTimeout(function(){btn.textContent='📋 Copy Full CRM Record';},1500);
}

loadSettings();
</script>
</body>
</html>
